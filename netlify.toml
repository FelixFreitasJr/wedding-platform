[build]
  publish = "."

[[redirects]]
  from = "/admin"
  to = "/pages/admin.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/pages/login.html"
  status = 200

[[redirects]]
  from = "/convite"
  to = "/pages/convite.html"
  status = 200

[[redirects]]
  from = "/rsvp"
  to = "/pages/rsvp.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
